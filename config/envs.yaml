version: 1

generator:
  active_backend: ligandmpnn
  ligandmpnn:
    env_name: ligandmpnn_env
    model_type: ligand_mpnn
    use_atom_context: 1
    parse_atoms_with_zero_occupancy: 0
    checkpoint_override: ""
    run_heartbeat_sec: 5

required_envs:
  ligandmpnn_env:
    role: generator
    health_check: "export PYTHONPATH=\"$(pwd)/scripts/vendor/pycompat:${PYTHONPATH:-}\" && cd models/LigandMPNN && python run.py --help"
  spurs:
    role: cheap_oracle
    health_check: "python -c 'import spurs.inference as s; print(\"ok\")'"
  bioemu:
    role: dynamics_oracle
    health_check: "python -m bioemu.sample --help"
  uma-qc:
    role: high_fidelity_oracle
    health_check: "python -c 'import fairchem.core as f; print(\"ok\")'"

optional_envs:
  ADFLIP:
    role: legacy_ablation_generator
    health_check: "cd models/ADFLIP && PYTHONPATH=. python test/design.py --help"
  KcatNet:
    role: kcat_oracle
    health_check: "python -c 'import torch, esm, transformers; from torch_geometric.data import Data; from rdkit import Chem; print(\"ok\")'"
  graphkcat:
    role: kcat_oracle
    health_check: "cd models/GraphKcat && python predict.py --help"
  apodock:
    role: kcat_oracle
    health_check: "cd models/GraphKcat && python predict.py --help"
  protrek:
    role: optional_split_or_tooling
    health_check: ""
  foundry:
    role: optional_tooling
    health_check: ""
  rfd3:
    role: optional_data_generation
    health_check: ""
